/* FAB */

// Group by city (for map)
function groupByCity(data) {
  const map = new Map();
  data.forEach(d => {
    if (!map.has(d.city)) map.set(d.city, []);
    map.get(d.city).push(d);
  });
  return Array.from(map.entries()).sort((a,b) => b[1].length - a[1].length || a[0].localeCompare(b[0]));
}

// Group by province → city
function groupByProvince(data) {
  const map = new Map();
  data.forEach(d => {
    const prov = d.province || d.city;
    if (!map.has(prov)) map.set(prov, new Map());
    const cityMap = map.get(prov);
    if (!cityMap.has(d.city)) cityMap.set(d.city, []);
    cityMap.get(d.city).push(d);
  });
  // Sort provinces, with 直辖市 first, then others alphabetically
  const order = new Map();
  const municipalities = ['北京市','天津市','上海市','重庆市'];
  const provinces = Array.from(map.keys());
  provinces.sort((a,b) => {
    const aMuni = municipalities.includes(a) ? 0 : 1;
    const bMuni = municipalities.includes(b) ? 0 : 1;
    if (aMuni !== bMuni) return aMuni - bMuni;
    return a.localeCompare(b, 'zh-CN');
  });
  return provinces.map(prov => {
    const cityMap = map.get(prov);
    const cities = Array.from(cityMap.entries())
      .map(([city, venues]) => ({ city, count: venues.length, venues }))
      .sort((a,b) => b.count - a.count || a.city.localeCompare(b.city, 'zh-CN'));
    return { province: prov, cities: cities, totalScreens: cities.reduce((s,c) => s + c.count, 0) };
  });
}

function renderSpecialProjects() {
  const container = document.getElementById('specialSection');
  let html = `<div class="section-title gold" onclick="toggleSection('specBody', this)">
    <span>✨ 特别企划</span><span class="s-arrow">▼</span>
  </div><div class="section-body" id="specBody">`;
  
  specialProjects.forEach((p, i) => {
    const iconHtml = p.iconImg ? `<img src="${p.iconImg}" class="special-poster" />` : (p.icon ? `<span class="icon">${p.icon}</span>` : `<img src="poster.jpg" class="special-poster" />`);
    html += `<div class="special-card" data-spidx="${i}">
      ${iconHtml}<div class="info"><div class="name">${p.name}</div><div class="sub">${p.venue}</div></div><span class="tag">${p.tag}</span>
    </div>`;
  });
  
  html += '</div>';
  container.innerHTML = html;
  
  // Re-attach click handlers
  container.querySelectorAll('.special-card').forEach(card => {
    const idx = parseInt(card.dataset.spidx);
    card.onclick = () => showDetail(specialProjects[idx], 'special');
  });
}

function renderCityList(filter = '') {
  const container = document.getElementById('cityList');
  const q = filter.trim().toLowerCase();
  
  // If searching, show flat results
  if (q) {
    const filtered = allCities.filter(c => c.city.includes(q) || c.venues.some(v => v.venue.includes(q) || v.station.includes(q)));
    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty">没有找到匹配的应援 💜</div>';
      return;
    }
    container.innerHTML = filtered.map(c => {
      const venuesText = c.venues.map(v => v.venue).join(' · ').substring(0, 40) + (c.venues.map(v => v.venue).join(' · ').length > 40 ? '...' : '');
      return `<div class="city-card" onclick="showCityDetail('${c.city}')">
        <img src="poster-screen.jpg" class="gradient-block" />
        <div class="city-info"><div class="city-name">${c.city}</div><div class="city-venues">${venuesText}</div></div>
        <span class="screen-count">${c.count}块大屏</span>
      </div>`;
    }).join('');
    return;
  }
  
  // Default: province-grouped view
  if (provinceGroups.length === 0) {
    container.innerHTML = '<div class="empty">暂无数据 💜</div>';
    return;
  }
  
  container.innerHTML = provinceGroups.map((prov, idx) => {
    const provId = 'prov-' + idx;
    const citiesHTML = prov.cities.map(c => {
      const venuesText = c.venues.map(v => v.venue).join(' · ').substring(0, 40) + (c.venues.map(v => v.venue).join(' · ').length > 40 ? '...' : '');
      return `<div class="city-card" onclick="showCityDetail('${c.city}')">
        <img src="poster-screen.jpg" class="gradient-block" />
        <div class="city-info"><div class="city-name">${c.city}</div><div class="city-venues">${venuesText}</div></div>
        <span class="screen-count">${c.count}块大屏</span>
      </div>`;
    }).join('');
    
    return `<div class="province-header" onclick="toggleProvince('${provId}')">
      <span class="arrow">▼</span>
      <span>${prov.province}</span>
      <span style="color:var(--purple);font-size:10px;margin-left:auto">${prov.totalScreens}块大屏</span>
    </div>
    <div class="province-cities" id="${provId}">${citiesHTML}</div>`;
  }).join('');
}

function toggleProvince(id) {
  const el = document.getElementById(id);
  const header = el.previousElementSibling;
  if (!el || !header) return;
  el.classList.toggle('collapsed');
  header.classList.toggle('collapsed');
}

function toggleSection(bodyId, headerEl) {
  const body = document.getElementById(bodyId);
  if (!body) return;
  body.classList.toggle('collapsed');
  headerEl.classList.toggle('collapsed');
}

// ========== LOCATION & DISTANCE ==========
let userPosition = null;
let locationStatus = 'idle'; // idle | locating | located | denied

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDistance(km) {
  if (km < 1) return (km * 1000).toFixed(0) + 'm';
  if (km < 10) return km.toFixed(1) + 'km';
  return Math.round(km) + 'km';
}

function requestLocation(callback) {
  locationStatus = 'locating';
  if (!navigator.geolocation) {
    locationStatus = 'denied';
    if (callback) callback(false);
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      userPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      locationStatus = 'located';
      if (callback) callback(true);
    },
    err => {
      locationStatus = 'denied';
      if (callback) callback(false);
    },
    { enableHighAccuracy: false, timeout: 8000, maximumAge: 600000 }
  );
}

function renderNearbyList() {
  const container = document.getElementById('cityList');
  
  // Show status bar
  const statusBar = document.getElementById('nearbyStatus');
  if (!statusBar) {
    const ref = document.getElementById('listContainer');
    const bar = document.createElement('div');
    bar.id = 'nearbyStatus';
    bar.className = 'nearby-status';
    ref.parentNode.insertBefore(bar, ref);
  }
  
  if (locationStatus === 'idle' || locationStatus === 'locating') {
    document.getElementById('nearbyStatus').className = 'nearby-status locating';
    document.getElementById('nearbyStatus').innerHTML = '<span class="ns-dot pulse"></span> 正在获取位置…';
    container.innerHTML = '';
    requestLocation(success => {
      if (document.querySelector('.tab-item.active').textContent.includes('附近')) {
        if (success) renderNearbyList();
        else renderNearbyList();
      }
    });
    return;
  }
  
  if (locationStatus === 'denied' || !userPosition) {
    document.getElementById('nearbyStatus').className = 'nearby-status denied';
    document.getElementById('nearbyStatus').innerHTML = '<span class="ns-dot err"></span> 需要定位权限才能查看附近应援 <span class="ns-retry" onclick="retryLocation()">重新定位</span>';
    container.innerHTML = '<div class="empty" style="padding:32px 20px">定位未授权，请允许位置权限后重试<br><span style="color:var(--purple);font-size:12px;cursor:pointer;margin-top:8px;display:inline-block" onclick="retryLocation()">📍 点击重新获取位置</span></div>';
    return;
  }
  
  // Calculate distances for all cities
  const withDistance = allCities.map(c => {
    const avgLat = c.venues.reduce((s,v) => s + v.lat, 0) / c.venues.length;
    const avgLng = c.venues.reduce((s,v) => s + v.lng, 0) / c.venues.length;
    return { ...c, avgLat, avgLng, dist: haversine(userPosition.lat, userPosition.lng, avgLat, avgLng) };
  }).sort((a,b) => a.dist - b.dist);
  
  // Status: found X nearby cities
  const nearestDist = withDistance[0].dist;
  document.getElementById('nearbyStatus').className = 'nearby-status located';
  document.getElementById('nearbyStatus').innerHTML = '<span class="ns-dot pulse"></span> 最近应援 <b>' + formatDistance(nearestDist) + '</b> · ' + withDistance.length + '个城市 <span class="ns-retry" onclick="retryLocation()">刷新</span>';
  
  // Render sorted
  container.innerHTML = withDistance.map(c => {
    const venuesText = c.venues.map(v => v.venue).join(' · ').substring(0, 40) + (c.venues.map(v => v.venue).join(' · ').length > 40 ? '...' : '');
    return `<div class="city-card" onclick="showCityDetail('${c.city}')">
      <img src="poster-screen.jpg" class="gradient-block" />
      <div class="city-info"><div class="city-name">${c.city}</div><div class="city-venues">${venuesText}</div></div>
      <span class="distance-badge">📍 ${formatDistance(c.dist)}</span>
      <span class="screen-count">${c.count}块大屏</span>
    </div>`;
  }).join('');
  
  // Also plot on map
  map.setView([userPosition.lat, userPosition.lng], 5);
}

function retryLocation() {
  userPosition = null;
  locationStatus = 'idle';
  renderNearbyList();
}

// ========== TABS ==========
function switchTab(tab, el) {
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const container = document.getElementById('listContainer');
  const statusBar = document.getElementById('nearbyStatus');
  
  // Remove nearby status bar if not nearby tab
  if (statusBar) statusBar.remove();
  
  if (tab === 'abroad') {
    let html = '<div class="section"><div class="section-title purple">🌏 海外应援</div>';
    if (overseasData.length === 0) {
      html += '<div class="empty" style="padding:60px 20px">海外应援数据持续更新中…<br>敬请期待 💜</div>';
    } else {
      html += '<div class="section-body" style="padding:0 16px 12px">';
      overseasData.forEach(o => {
        html += `<div class="city-card" onclick="showOverseasDetail('${o.id}')">
          <span style="font-size:24px;margin-right:10px">🌏</span>
          <div class="city-info">
            <div class="city-name">${o.country} · ${o.city}</div>
            <div class="city-venues">${o.venue} ${o.date ? '· ' + o.date : ''}</div>
            <div class="city-venues" style="font-size:11px;color:#A8A8C2">${o.station || ''}</div>
          </div>
          ${o.tag ? `<span class="tag" style="font-size:10px;font-weight:600;color:var(--purple);white-space:nowrap">${o.tag}</span>` : ''}
        </div>`;
      });
      html += '</div>';
    }
    html += '</div>';
    container.innerHTML = html;
  } else if (tab === 'nearby') {
    container.innerHTML = '<div class="section" id="screenSection"><div class="section-title purple"><span>📍 附近应援点</span></div><div class="section-body"><div id="cityList"></div></div></div>';
    renderNearbyList();
  } else {
    container.innerHTML = '<div class="section" id="specialSection"></div><div class="section" id="screenSection"><div class="section-title purple" onclick="toggleSection(&#39;screenBody&#39;, this)"><span>📺 全国大屏点亮计划</span><span class="s-arrow">▼</span></div><div class="section-body" id="screenBody"><div id="cityList"></div></div></div>';
    renderSpecialProjects();
    renderCityList();
  }
}

// ========== COUNTDOWN ==========
function updateCountdown() {
  const target = new Date('2026-07-11T00:00:00+08:00');
  const now = new Date();
  const diff = target - now;
  if (diff <= 0) {
    document.getElementById('cd-d').textContent = '🎂';
    ['cd-h','cd-m','cd-s'].forEach(id => document.getElementById(id).parentElement.style.display = 'none');
    return;
  }
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  document.getElementById('cd-d').textContent = String(d).padStart(2, '0');
  document.getElementById('cd-h').textContent = String(h).padStart(2, '0');
  document.getElementById('cd-m').textContent = String(m).padStart(2, '0');
  document.getElementById('cd-s').textContent = String(s).padStart(2, '0');
}

    </div>

    <div class="field"><label>联系方式（选填，方便回访确认）</label><input type="text" id="sfContact" placeholder="如：小红书ID或微信号" maxlength="60"></div>
    <div class="field"><label>备注</label><textarea id="sfNotes" placeholder="补充说明…" maxlength="200"></textarea></div>
    <div class="modal-actions">

    </div>
  `;

function closeSubmitForm() { document.getElementById('submitOverlay').classList.remove('show'); }
function doSubmit() {
  const city = document.getElementById('sfCity').value.trim();
  const venue = document.getElementById('sfVenue').value.trim();
  const province = document.getElementById('sfProvince').value.trim();
  if (!city || !venue || !province) { alert('请至少填写省份、城市和地点'); return; }
  
  const entry = {
    province, city, venue,
    date: document.getElementById('sfDate').value.trim() || '7.11',
    type: document.getElementById('sfType').value,
    station: document.getElementById('sfStation').value.trim() || '未填写',
    benefit: document.getElementById('sfBenefit').value.trim() || '',
    contact: document.getElementById('sfContact').value.trim() || '',
    notes: document.getElementById('sfNotes').value.trim() || '',
    time: new Date().toISOString()
  };
  
  // Save to localStorage
  let pending = JSON.parse(localStorage.getItem('ymh_pending') || '[]');
  pending.push(entry);
  localStorage.setItem('ymh_pending', JSON.stringify(pending));
  
  // Show done + copy text
  const text = `【岳明辉711应援补充】
📌 ${entry.type} | ${entry.province} ${entry.city}
📍 ${entry.venue}
📅 ${entry.date}
🏷 ${entry.station}
${entry.benefit ? '✨ ' + entry.benefit : ''}
${entry.contact ? '📞 ' + entry.contact : ''}
${entry.notes ? '💬 ' + entry.notes : ''}`;
  
  const panel = document.getElementById('submitPanel');
  panel.innerHTML = `
    <div class="submit-done">
      <div class="done-icon">✅</div>
      <p>提交成功！审核通过后即可上线显示 💜</p>
      <div class="copied-text">${text.replace(/\n/g, '<br>')}</div>
      <div class="modal-actions">
        <button class="modal-btn secondary" onclick="closeSubmitForm()">关闭</button>
        <button class="modal-btn primary" onclick="copyText(\`${text.replace(/`/g,'\\`').replace(/\\/g,'\\\\')}\`)">📋 复制文案</button>
      </div>
    </div>
  `;
  updateFabBadge();
  
  // Auto-copy
  setTimeout(() => {
    try { navigator.clipboard.writeText(text); } catch(e) {}
  }, 200);
}
function copyText(text) {
  try { navigator.clipboard.writeText(text); alert('已复制！可以发给管理员审核'); } catch(e) { alert('复制失败，请手动长按复制'); }
}

// ========== ADMIN PANEL ==========
let heroTapCount = 0, heroTapTimer = null;
document.querySelector('.hero h1').onclick = function() {
  heroTapCount++;
  clearTimeout(heroTapTimer);
  heroTapTimer = setTimeout(() => { heroTapCount = 0; }, 1500);

function openAdmin() {

  const list = document.getElementById('adminList');

    list.innerHTML = '<div class="admin-empty">暂无待审核的应援 🙌</div>';
  } else {
    list.innerHTML = pending.map((p,i) => `
      <div class="admin-item">
        <div class="ai-row"><span class="ai-l">类型</span><span class="ai-v">${p.type}</span></div>
        <div class="ai-row"><span class="ai-l">地点</span><span class="ai-v">${p.province} ${p.city} · ${p.venue}</span></div>
        <div class="ai-row"><span class="ai-l">日期</span><span class="ai-v">${p.date}</span></div>
        <div class="ai-row"><span class="ai-l">主办</span><span class="ai-v">${p.station}</span></div>
        ${p.benefit ? `<div class="ai-row"><span class="ai-l">福利</span><span class="ai-v">${p.benefit}</span></div>` : ''}
        ${p.contact ? `<div class="ai-row"><span class="ai-l">联系</span><span class="ai-v">${p.contact}</span></div>` : ''}
        ${p.notes ? `<div class="ai-row"><span class="ai-l">备注</span><span class="ai-v">${p.notes}</span></div>` : ''}
        <div class="admin-actions">
          <button class="admin-btn done" onclick="markDone(${i})">✅ 已录入</button>
          <button class="admin-btn del" onclick="markDelete(${i})">🗑 删除</button>
        </div>
      </div>`).join('');
  }
  document.getElementById('adminPanel').classList.add('show');
}
function closeAdmin() { document.getElementById('adminPanel').classList.remove('show'); updateFabBadge(); }
function markDone(i) {
  let pending = JSON.parse(localStorage.getItem('ymh_pending') || '[]');
  let done = JSON.parse(localStorage.getItem('ymh_done') || '[]');
  done.push(pending[i]);
  pending.splice(i, 1);
  localStorage.setItem('ymh_pending', JSON.stringify(pending));
  localStorage.setItem('ymh_done', JSON.stringify(done));
  openAdmin();
  updateFabBadge();
}
function markDelete(i) {
  let pending = JSON.parse(localStorage.getItem('ymh_pending') || '[]');
  pending.splice(i, 1);
  localStorage.setItem('ymh_pending', JSON.stringify(pending));
  openAdmin();
  updateFabBadge();
}
function exportPending() {
  const pending = JSON.parse(localStorage.getItem('ymh_pending') || '[]');
  if (pending.length === 0) { alert('暂无待审核数据'); return; }
  const text = pending.map(p =>
    `${p.province}\t${p.city}\t${p.venue}\t${p.type}\t${p.date}\t${p.station}\t${p.benefit || '-'}\t${p.contact || '-'}\t${p.notes || '-'}`
  ).join('\n');
  const header = '省份\t城市\t地点\t类型\t日期\t应援站\t福利\t联系方式\t备注\n';
  try {
    navigator.clipboard.writeText(header + text);
    alert('已复制 ' + pending.length + ' 条待审核数据！可直接粘贴发给WorkBuddy录入');
  } catch(e) {
    // Fallback: download as txt
    const blob = new Blob([header + text], {type:'text/plain;charset=utf-8'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'ymh_pending.txt'; a.click();
  }
}
function updateFabBadge() {
  const pending = JSON.parse(localStorage.getItem('ymh_pending') || '[]');
  const badge = document.getElementById('fabBadge');
  if (pending.length > 0) {
    badge.textContent = pending.length;
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}
